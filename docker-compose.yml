services:
  app:
    build:
      context: .
    image: quant-trading:local
    container_name: quant-trading-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-quant_trading}
      SQLITE_PATH: ${SQLITE_PATH:-data/sqlite/trading.db}
      LOG_FILE: ${LOG_FILE:-logs/app.log}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: quant-trading-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-quant_trading}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mongo_data:
